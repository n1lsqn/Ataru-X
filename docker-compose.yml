services:
  postgres:
    image: postgres:15-alpine
    container_name: ataru-postgres
    ports:
      - '5439:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ataru_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ataru-redis
    ports:
      - '6389:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
